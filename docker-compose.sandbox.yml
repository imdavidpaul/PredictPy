# PredictPy — Sandbox (local build)
# Builds images from source and serves everything through Nginx on port 80.
#
# Usage:
#   docker compose -f docker-compose.sandbox.yml up --build
#
# Then open:
#   App  → http://localhost
#   Docs → http://localhost/api/docs

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      - ALLOWED_ORIGINS=http://localhost

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/api
    expose:
      - "3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
